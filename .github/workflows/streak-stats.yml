name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *"   # once a day, 3 AM UTC
  push:
    paths:
      - ".github/workflows/streak-stats.yml"   # re-run any time this file is edited
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Karan2007May&theme=radical&hide_border=true&card_width=480
          path: assets/streak-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/streak-stats.svg
          git commit -m "Update streak stats" || exit 0
          git push
