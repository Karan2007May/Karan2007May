name: Generate Streak Stats SVG

on:
  schedule:
    - cron: "0 0 * * *"   # once a day, midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats SVG
        uses: DenverCoder1/github-readme-streak-stats@master
        with:
          user_id: Karan2007May
          theme: radical
          hide_border: true
          card_width: 480
          output: assets/streak-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak-stats.svg
          git diff --staged --quiet || git commit -m "Update streak stats"
          git push
