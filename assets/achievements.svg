<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1e1030"/>
    </linearGradient>
    <linearGradient id="num" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF39A9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="14" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="899" height="199" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- divider lines -->
  <line x1="225" y1="40" x2="225" y2="160" stroke="#ffffff" stroke-opacity="0.08"/>
  <line x1="450" y1="40" x2="450" y2="160" stroke="#ffffff" stroke-opacity="0.08"/>
  <line x1="675" y1="40" x2="675" y2="160" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Card 1 -->
  <text x="112" y="105" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="url(#num)" text-anchor="middle">12+</text>
  <text x="112" y="135" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#c6cbd8" text-anchor="middle">Client Projects</text>
  <text x="112" y="153" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#7d8598" text-anchor="middle">AI, CRM &amp; SaaS</text>

  <!-- Card 2 -->
  <text x="337" y="105" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="url(#num)" text-anchor="middle">40+</text>
  <text x="337" y="135" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#c6cbd8" text-anchor="middle">Business Artifacts</text>
  <text x="337" y="153" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#7d8598" text-anchor="middle">BRDs, FRDs &amp; more</text>

  <!-- Card 3 -->
  <text x="562" y="105" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="url(#num)" text-anchor="middle">20+</text>
  <text x="562" y="135" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#c6cbd8" text-anchor="middle">Pre-Sales Deals</text>
  <text x="562" y="153" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#7d8598" text-anchor="middle">Scoping &amp; estimates</text>

  <!-- Card 4 -->
  <text x="787" y="105" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="url(#num)" text-anchor="middle">30+</text>
  <text x="787" y="135" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#c6cbd8" text-anchor="middle">Team Led</text>
  <text x="787" y="153" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#7d8598" text-anchor="middle">Rotaract President</text>
</svg>
